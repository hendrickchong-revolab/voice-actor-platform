services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: va
      POSTGRES_PASSWORD: va
      POSTGRES_DB: va_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U va -d va_platform"]
      interval: 2s
      timeout: 2s
      retries: 30

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  pyworker:
    image: python:3.12-slim
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: postgresql://va:va@postgres:5432/va_platform?schema=public
      PYWORKER_HOST: 0.0.0.0
      PYWORKER_PORT: 8000
      # Pass through S3/MinIO settings so the worker can download audio.
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minio}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minio123456}
      # NISQA command template (must be provided by you; see README notes in pyworker/nisqa_runner.py)
      # Example: NISQA_PREDICT_CMD: "nisqa_predict --input {wav} --output -"
      NISQA_PREDICT_CMD: ${NISQA_PREDICT_CMD:-}
      NISQA_MIN_SCORE: ${NISQA_MIN_SCORE:-2.5}
    command: bash -lc "apt-get update && apt-get install -y --no-install-recommends ffmpeg && rm -rf /var/lib/apt/lists/* && pip install -U pip && pip install fastapi uvicorn[standard] psycopg[binary] boto3 && python -m pyworker.run"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  migrate:
    image: node:20-slim
    working_dir: /app/web
    volumes:
      - ./:/app
      - web_node_modules:/app/web/node_modules
    environment:
      DATABASE_URL: postgresql://va:va@postgres:5432/va_platform?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -lc
      "apt-get update && apt-get install -y --no-install-recommends openssl ca-certificates && rm -rf /var/lib/apt/lists/*
      && npm install --no-audit --no-fund --no-package-lock
      && npx prisma generate
      && npx prisma migrate deploy
      && node prisma/seed.js"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  web_node_modules:
