services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: va
      POSTGRES_PASSWORD: va
      POSTGRES_DB: va_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  pyworker:
    image: python:3.12-slim
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: postgresql://va:va@postgres:5432/va_platform?schema=public
      PYWORKER_HOST: 0.0.0.0
      PYWORKER_PORT: 8000
    command: bash -lc "pip install -U pip && pip install fastapi uvicorn[standard] psycopg[binary] && python -m pyworker.run"
    depends_on:
      - postgres
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  redis_data:
  minio_data:
